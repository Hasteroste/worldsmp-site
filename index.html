<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>WorldSMP • Правила и Жалобы (3D + Уведомления)</title>

<body>
    <!-- ... весь HTML-код остаётся прежним ... -->

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, get, set, update, push, child, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // Ваш конфиг Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCjO7pftO6WO228b4Bjk5fIJuSMmdll408",
            authDomain: "worldsmp-31a7d.firebaseapp.com",
            databaseURL: "https://worldsmp-31a7d-default-rtdb.firebaseio.com",
            projectId: "worldsmp-31a7d",
            storageBucket: "worldsmp-31a7d.firebasestorage.app",
            messagingSenderId: "199279420728",
            appId: "1:199279420728:web:768acff7a519a62a7a4dcd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Ссылки на узлы базы данных
        const usersRef = ref(db, 'users');
        const complaintsRef = ref(db, 'complaints');
        const newsRef = ref(db, 'news');
        const whitelistRef = ref(db, 'whitelist');

        // Текущий пользователь
        let currentUser = null;
        const STORAGE_KEY = 'worldsmp_current_user';

        // Вспомогательные функции
        function setCurrentUser(user) {
            currentUser = user;
            if (user) localStorage.setItem(STORAGE_KEY, JSON.stringify(user));
            else localStorage.removeItem(STORAGE_KEY);
        }
        function getCurrentUser() { return currentUser; }

        // Инициализация базы данных (если пусто, создаём админа и модератора)
        async function initDefaults() {
            const snap = await get(usersRef);
            if (!snap.exists()) {
                await set(usersRef, {
                    admin: { password: 'admin123', role: 'admin', warnings: [] },
                    moderator: { password: 'mod123', role: 'moderator', warnings: [] }
                });
            }
        }

        // Базовые операции с пользователями
        async function getUsers() { const s = await get(usersRef); return s.val() || {}; }
        async function getUser(username) { const s = await get(child(usersRef, username)); return s.val(); }
        async function saveUser(username, data) { await set(child(usersRef, username), data); }
        async function updateUser(username, updates) { await update(child(usersRef, username), updates); }

        // Базовые операции с жалобами
        async function getComplaints() { const s = await get(complaintsRef); return s.val() || {}; }
        async function saveComplaint(complaint) { const newRef = push(complaintsRef); await set(newRef, complaint); return newRef.key; }
        async function updateComplaint(id, updates) { await update(child(complaintsRef, id), updates); }
        async function deleteComplaint(id) { await remove(child(complaintsRef, id)); }

        // Авторизация
        window.login = async function() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorEl = document.getElementById('loginError');
            errorEl.textContent = '';
            if (!username || !password) { errorEl.textContent = '⚠️ Заполните все поля!'; return; }
            const user = await getUser(username);
            if (!user || user.password !== password) { errorEl.textContent = '❌ Неверный логин или пароль!'; return; }
            setCurrentUser({ username, role: user.role });
            closeModal('loginModal');
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            updateUI();
        };

        window.register = async function() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const confirm = document.getElementById('regPasswordConfirm').value.trim();
            const errorEl = document.getElementById('regError');
            const successEl = document.getElementById('regSuccess');
            errorEl.textContent = ''; successEl.textContent = '';
            if (!username || !password || !confirm) { errorEl.textContent = '⚠️ Заполните все поля!'; return; }
            if (username.length < 3) { errorEl.textContent = '⚠️ Логин должен быть не менее 3 символов!'; return; }
            if (password.length < 4) { errorEl.textContent = '⚠️ Пароль должен быть не менее 4 символов!'; return; }
            if (password !== confirm) { errorEl.textContent = '❌ Пароли не совпадают!'; return; }
            const users = await getUsers();
            if (users[username]) { errorEl.textContent = '❌ Пользователь с таким логином уже существует!'; return; }
            await saveUser(username, { password, role: 'user', warnings: [] });
            successEl.textContent = '✅ Регистрация успешна! Теперь войдите.';
            document.getElementById('regUsername').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regPasswordConfirm').value = '';
            setTimeout(() => { closeModal('registerModal'); successEl.textContent = ''; openLoginModal(); }, 1500);
        };

        window.logout = function() {
            setCurrentUser(null);
            updateUI();
            switchTab('tab-rules', document.querySelector('#tabContainer .tab-btn'));
        };

        // Уведомления
        function playNotificationSound() {
            const audio = document.getElementById('notificationSound');
            if (audio) { audio.currentTime = 0; audio.play().catch(()=>{}); }
        }

        function showSiteNotification(title, body) {
            const existing = document.querySelector('.notification-modal');
            if (existing) existing.remove();
            const div = document.createElement('div');
            div.className = 'notification-modal';
            div.innerHTML = `<h4>${title}</h4><p>${body}</p><button class="btn-close" onclick="this.parentElement.remove()">OK</button>`;
            document.body.appendChild(div);
            setTimeout(() => { if (div.parentElement) div.remove(); }, 6000);
            playNotificationSound();
        }

        function requestNotificationPermission() {
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }
        }

        function showBrowserNotification(title, body) {
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification(title, { body, icon: 'https://img.icons8.com/fluency/48/minecraft-pickaxe.png' });
            }
        }

        // Слушатели базы данных
        onValue(complaintsRef, () => { renderComplaintsList(); renderModerationTable(); renderAdminTable(); });
        onValue(usersRef, () => { if (getCurrentUser()?.role === 'admin') renderUsersTable(); });
        onValue(newsRef, () => { renderNews(); });
        onValue(whitelistRef, () => { if (getCurrentUser()) renderWhitelist(); });

        // Рендер всех компонентов (функции определены далее)
        async function renderComplaintsList() { /* ... */ }
        async function renderModerationTable() { /* ... */ }
        async function renderAdminTable() { /* ... */ }
        async function renderUsersTable() { /* ... */ }
        async function renderNews() { /* ... */ }
        async function renderWhitelist() { /* ... */ }

        // Остальные функции (submitComplaint, addReply, updateComplaintStatus и т.д.)
        // ... (весь предыдущий код из ответа)
    </script>
</body>
</html>
