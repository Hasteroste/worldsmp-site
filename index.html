<body>
<div class="bg-blur"></div><div class="bg-overlay"></div>
<div class="main-container" id="mainContainer">
    <h1 class="server-title">⛏️ WORLDSMP ⚔️</h1>

    <div id="guestBar" style="text-align:center; margin-bottom:15px;"><button class="auth-btn" onclick="openLoginModal()">🔑 ВХОД</button><button class="auth-btn secondary" onclick="openRegisterModal()">📝 РЕГИСТРАЦИЯ</button></div>

        <button class="tab-btn" onclick="switchTab('tab-complaints', this)">📋 Жалобы</button>
        <button class="tab-btn" onclick="switchTab('tab-news', this)">📰 Новости</button>
        <button class="tab-btn" id="tabModerationBtn" style="display:none;" onclick="switchTab('tab-moderation', this)">🛠️ Модерация</button>
        <button class="tab-btn" id="tabAdminBtn" style="display:none;" onclick="switchTab('tab-admin', this)">⚡ Админ</button>

    <!-- Вкладки правил (те же) -->
    <div id="tab-rules" class="tab-content main-tab active"> <!-- ... правила как в предыдущей версии ... --> </div>

                <div class="form-group"><label>Текст новости:</label><textarea id="newsText" placeholder="Текст новости..."></textarea></div>
                <div class="form-group"><label>Изображение (необязательно):</label>
                    <div class="custom-file-upload">
                        <input type="file" id="newsImageFile" accept="image/*" hidden onchange="updateNewsFileName(this)">
                        <button type="button" class="custom-file-btn" onclick="document.getElementById('newsImageFile').click()">📂 ВЫБРАТЬ ФАЙЛ</button>
                        <span id="newsFileName">Файл не выбран</span>
                    </div>
                </div>
                <button class="btn-submit" onclick="createNews()">📨 ОПУБЛИКОВАТЬ</button>
                <div class="success-msg" id="newsSuccess"></div><div class="error-msg" id="newsError"></div>
            </div>
        </div>

        <div class="news-list" id="newsList"><p style="color:#888; font-size:0.5rem; text-align:center;">Загрузка...</p></div>
    </div>

    <div id="tab-moderation" class="tab-content main-tab">...</div>
    <div id="tab-admin" class="tab-content main-tab">...</div>
</div>

<!-- Модальные окна (вход, регистрация, моды, предупреждение) -->
<div class="modal" id="loginModal">...</div>
<div class="modal" id="registerModal">...</div>
<div class="modal" id="modsModal">...</div>

        <div class="modal-buttons">
            <button class="btn-modal primary" onclick="confirmWarning()">ВЫДАТЬ</button>
            <button class="btn-modal secondary" onclick="closeModal('warningModal')">ОТМЕНА</button>
        </div>
    </div>
</div>

        authDomain: "worldsmp-31a7d.firebaseapp.com",
        databaseURL: "https://worldsmp-31a7d-default-rtdb.firebaseio.com",
        projectId: "worldsmp-31a7d",
        storageBucket: "worldsmp-31a7d.firebasestorage.app",
        messagingSenderId: "199279420728",
        appId: "1:199279420728:web:768acff7a519a62a7a4dcd"

    const db = getDatabase(app);
    const usersRef = ref(db, 'users');
    const complaintsRef = ref(db, 'complaints');
    const newsRef = ref(db, 'news');

    let currentUser = null;
    window.getCurrentUser = () => currentUser;
    window.setCurrentUser = (u) => { currentUser = u; };

    // Инициализация дефолтных аккаунтов
    async function initDefaults() {
        const snap = await get(usersRef);
        if (!snap.exists()) {
            await set(usersRef, {
                admin: { password: 'admin123', role: 'admin', warnings: [] },
                moderator: { password: 'mod123', role: 'moderator', warnings: [] }
            });
        }
    }
    initDefaults();

    // ... (функции работы с пользователями, жалобами, ответами, предупреждениями как раньше) ...

    // ========== НОВОСТИ ==========
    window.createNews = async function() {
        const user = getCurrentUser();
        if (!user || user.role !== 'admin') {
            document.getElementById('newsError').textContent = '❌ Только администратор!';
            return;
        }
        const title = document.getElementById('newsTitle').value.trim();
        const text = document.getElementById('newsText').value.trim();
        const fileInput = document.getElementById('newsImageFile');
        if (!title || !text) { document.getElementById('newsError').textContent = '⚠️ Заголовок и текст обязательны!'; return; }

        let imageData = null;
        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            if (file.size > 5 * 1024 * 1024) { // 5 MB limit
                document.getElementById('newsError').textContent = '⚠️ Изображение слишком большое (макс. 5 МБ)';
                return;
            }
            imageData = await new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        const newsItem = {
            title,
            text,
            image: imageData || null,
            createdAt: new Date().toISOString(),
            author: user.username
        };
        await push(newsRef, newsItem);
        document.getElementById('newsTitle').value = '';
        document.getElementById('newsText').value = '';
        document.getElementById('newsImageFile').value = '';
        document.getElementById('newsFileName').textContent = 'Файл не выбран';
        document.getElementById('newsSuccess').textContent = '✅ Новость опубликована!';
        setTimeout(() => document.getElementById('newsSuccess').textContent = '', 3000);
    };

    async function renderNews() {
        const snap = await get(newsRef);
        const newsData = snap.val() || {};
        const sorted = Object.entries(newsData).sort((a,b) => new Date(b[1].createdAt) - new Date(a[1].createdAt));
        const listEl = document.getElementById('newsList');
        if (sorted.length === 0) {
            listEl.innerHTML = '<p style="color:#888; font-size:0.5rem;">Новостей пока нет.</p>';
            return;
        }
        listEl.innerHTML = sorted.map(([id, n]) => `
            <div class="news-card">
                <h3>${escapeHTML(n.title)}</h3>
                <div class="news-date">${new Date(n.createdAt).toLocaleString('ru')} • Автор: ${escapeHTML(n.author)}</div>
                <div class="news-text">${escapeHTML(n.text)}</div>
                ${n.image ? `<img src="${escapeHTML(n.image)}" alt="новость">` : ''}
            </div>
        `).join('');
    }

    onValue(newsRef, renderNews);

    // Предупреждения через модалку
    window.showWarningModal = function(username) {
        document.getElementById('warningUsername').value = username;
        document.getElementById('warningReason').value = '';
        openModal('warningModal');
    };

    window.confirmWarning = async function() {
        const username = document.getElementById('warningUsername').value;
        const reason = document.getElementById('warningReason').value.trim();
        if (!reason) return alert('Введите причину!');
        const user = getCurrentUser();
        if (!user || user.role !== 'admin') return;
        const users = await getUsers();
        const u = users[username];
        if (!u) return;
        if (!u.warnings) u.warnings = [];
        u.warnings.push({ reason, date: new Date().toISOString() });
        if (u.role === 'moderator' && u.warnings.length >= 3) {
            u.role = 'user';
            alert(`⚠️ Пользователь ${username} получил 3 предупреждения и снят с модерации.`);
        }
        await saveUser(username, u);
        closeModal('warningModal');
    };

    // Обновляем renderUsersTable, чтобы кнопка вызывала showWarningModal
    // В функции renderUsersTable замените вызов addWarning на showWarningModal
</script>
